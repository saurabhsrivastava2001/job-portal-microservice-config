server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthenticationFilter
        - id: job-service
          uri: lb://JOB-SERVICE
          predicates:
            - Path=/api/jobs/**
          filters:
            - JwtAuthenticationFilter
        - id: application-service
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/api/applications/**
          filters:
            - JwtAuthenticationFilter
        - id: resume-service
          uri: lb://RESUME-SERVICE
          predicates:
            - Path=/api/resumes/**
          filters:
            - JwtAuthenticationFilter
        - id: search-service
          uri: lb://SEARCH-SERVICE
          predicates:
            - Path=/api/search/**
          filters:
            - JwtAuthenticationFilter

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: user-service
        url: /api/users/v3/api-docs
      - name: job-service
        url: /api/jobs/v3/api-docs
      - name: application-service
        url: /api/applications/v3/api-docs
      - name: resume-service
        url: /api/resumes/v3/api-docs
      - name: search-service
        url: /api/search/v3/api-docs
